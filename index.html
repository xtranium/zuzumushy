<!DOCTYPE html>
<html>
<head>
  <title>zuzumushy's chat</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Chat area */
   #chat {
  flex: 1;
  overflow-y: auto;
  padding: 5px;
  display: flex;
  flex-direction: column;
  gap: 10px;


  background-image: url('https://files.catbox.moe/rdb9fg.jpg');
  background-size:contain;
  background-position: center;
  background-repeat: no-repeat;
  

  
}

    /* Reply preview box */
    #replyBox {
      display: none;
      padding: 6px 10px;
      background: #e398cd;
      border-left: 4px solid #1e88e5;
      font-size: 13px;
    }

    /* Input area */
    #inputArea {
      background: rgb(237, 233, 233);
      border-top: 1px solid #ccc;
      padding: 10px;
      background-image: url('https://i.pinimg.com/736x/c4/b0/51/c4b051310e05cabcc697e7b4082afa70.jpg');
 background-size: contain;
  background-position: right; /* Centers the image */
  background-repeat:repeat;
    }

    #msg {
  width: 100%;
  min-height: 40px;
  max-height: 120px;
  resize: none;
  padding: 10px 14px;
  border-radius: 20px;
  border: none;
  outline: none;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.3;
  box-sizing: border-box;

  background:#c20000;
  backdrop-filter: blur(6px);
 background-image: url('https://i.pinimg.com/1200x/d1/d2/43/d1d24331ae51c45780879197d3f35082.jpg');
 background-size: contain;
  background-position: right; /* Centers the image */
  background-repeat: no-repeat;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

    .inputRow {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      
    }

    button {
      cursor: pointer;
    }
    .msg-text {
      margin: 0;
      padding: 0;
      line-height: 1.2;   /* key change */
     }
     
     .msg-time {
       font-size: 10px;
       opacity: 0.7;
       margin-top: 2px;
       text-align: right;
       line-height: 1;
      }

      
  </style>
</head>

<body>

<div id="app">

  <div id="chat"></div>

  <div id="replyBox">
    Replying to: <span id="replyText"></span>
    <button onclick="cancelReply()">✖</button>
  </div>

  <div id="inputArea">
    <div>
      <button onclick="addEmoji('❤️')">❤️</button>
      <button onclick="addEmoji('😂')">😂</button>
      <button onclick="addEmoji('😎')">😎</button>
      <button onclick="addEmoji('😡')">😡</button>
      <button onclick="addEmoji('💋')">💋</button>
      <button onclick="addEmoji('🤤')">🤤</button>
      <button onclick="addEmoji('😍')">😍</button>
      <button onclick="addEmoji('🥺')">🥺</button>
      <button onclick="addEmoji('🥸')">🥸</button>
    </div>

    <div class="inputRow">
      <textarea id="msg" placeholder="Type message"></textarea>
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>




<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, deleteDoc }   
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let firstLoad = true;
let shouldScroll = false;
let lastMessageCount = 0;
//protection


/* 🔥 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCGL24BmvMdrMuMmTdB5ZmsBpXyr_c2ok0",
  authDomain: "zuzumushy-9f5c8.firebaseapp.com",
  projectId: "zuzumushy-9f5c8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 👤 Username */
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

/* 💬 Reply state */
let replyingTo = null;

/* 📤 Send message */
window.sendMsg = async function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;
  shouldScroll = true;

  await addDoc(collection(db, "messages"), {
  text,
  user: username,
  time: Date.now(),
  replyTo: replyingTo || null,
  seen: false
});

  input.value = "";
  cancelReply();
};

/* 💬 Reply functions */
window.setReply = function(id, text) {
  replyingTo = id;
  document.getElementById("replyBox").style.display = "block";
  document.getElementById("replyText").innerText = text.substring(0, 40);
};

window.cancelReply = function() {
  replyingTo = null;
  document.getElementById("replyBox").style.display = "none";
};

/* 😊 Emoji */
window.addEmoji = function(emoji) {
  const input = document.getElementById("msg");
  input.value += emoji;
  input.focus();
};

/* ⌨️ Enter send */
const textarea = document.getElementById("msg");

textarea.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

/* 📈 Auto grow (controlled) */
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 90) + "px";
});

/* 📥 Render messages */
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, async (snapshot) => {

  const chat = document.getElementById("chat");
  const prevScroll = chat.scrollTop;
  const prevHeight = chat.scrollHeight;

  // 🔥 STEP 1: mark ONLY latest unseen message as seen (prevents spam)
  const lastDoc = snapshot.docs[snapshot.docs.length - 1];
  if (lastDoc) {
    const data = lastDoc.data();
    if (data.user !== username && !data.seen) {
      await updateDoc(doc(db, "messages", lastDoc.id), { seen: true });
    }
  }

  // 🔥 STEP 2: if messages deleted → reset
  if (snapshot.docs.length < lastMessageCount) {
    chat.innerHTML = "";
    lastMessageCount = 0;
  }

  // 🔥 STEP 3: build HTML (NO DOM SPAM)
  let html = "";

  snapshot.docs.forEach((doc, index) => {
    if (index < lastMessageCount) return;

    const data = doc.data();
    const text = data.text.replace(/\n/g, "<br>");
    const time = formatTime(data.time);
    const safeText = data.text.replace(/'/g, "\\'");

    const prevDoc = snapshot.docs[index - 1];
    const prevUser = prevDoc ? prevDoc.data().user : null;
    const showUsername = data.user !== prevUser;

    let replyPreview = "";
    if (data.replyTo) {
      const ref = snapshot.docs.find(d => d.id === data.replyTo);
      if (ref) {
        replyPreview = `
          <div style="
            font-size:11px;
            opacity:0.7;
            border-left:3px solid #888;
            padding-left:6px;
            margin-bottom:2px;
            

          ">
            ${ref.data().text.substring(0, 40)}
          </div>
        `;
      }
    }

    // 🔵 YOUR MESSAGE
    if (data.user === username) {
      html += `
        <div style="display:flex; justify-content:flex-end;">
          <div onclick="setReply('${doc.id}', '${safeText}')" style="
            background:#dd70dc;
            color: white;
  padding: 5px 10px;
  border-radius: 16px;
  max-width: min(60%, 550px);
  display: flex;
  flex-direction: column;
  word-break: break-word;
  white-space: pre-wrap;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
          


          ">
            ${replyPreview}
            <div class="msg-text">${text}</div>

            <div style="
              display:flex;
              justify-content:flex-end;
              align-items:center;
              gap:6px;
              font-size:10px;
              opacity:0.7;
              margin-top:2px;
            ">
              <span>${time} ${data.seen ? "✔✔" : "✔"}</span>
              <span style="cursor:pointer;" onclick="deleteMsg('${doc.id}')">🗑</span>
            </div>
          </div>
        </div>
      `;
    }

    // ⚪ GF MESSAGE
    else {
      html += `
        <div style="display:flex; justify-content:flex-start;">
          <div onclick="setReply('${doc.id}', '${safeText}')" style="
            background: #714cad;
  color: white;
  padding: 5px 10px;
  border-radius: 16px;
  max-width: min(60%, 550px);
  display: flex;
  flex-direction: column;
  word-break: break-word;
  white-space: pre-wrap;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);

          
    
          ">

            ${showUsername ? `
  <div style="
    font-size:14px;
    font-weight:800;
    opacity:0.8;
    margin-bottom:2px;
    line-height:1;color:black;
    text-shadow: 0 0 10px #FFC0CB, 
                 0 0 20px #FFC0CB, 
                 0 0 30px #FFC0CB;
    
  ">
    ${data.user}
  </div>
` : ""}

            ${replyPreview}
            <div class="msg-text">${text}</div>

            <div class="msg-time">${time}</div>

          </div>
        </div>
      `;
    }
  });

  // 🔥 STEP 4: apply HTML ONCE (no lag)
  chat.innerHTML += html;

  // 🔥 STEP 5: update count
  lastMessageCount = snapshot.docs.length;

  // 🔥 STEP 6: scroll logic
  if (firstLoad) {
    chat.scrollTop = chat.scrollHeight;
    firstLoad = false;
  }
  else if (shouldScroll) {
    chat.scrollTop = chat.scrollHeight;
    shouldScroll = false;
  }
  else {
    chat.scrollTop = prevScroll + (chat.scrollHeight - prevHeight);
  }

});
//time function
function formatTime(ms) {
  const date = new Date(ms);
  return date.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
 
  });
  
}

//delete function
window.deleteMsg = async function(id) {
  if (!confirm("Delete this message?")) return;

  await deleteDoc(doc(db, "messages", id));
};



</script>

</body>
</html>
